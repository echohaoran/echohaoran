<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="8">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a2e" />
      <stop offset="25%" stop-color="#00f7ff" />
      <stop offset="50%" stop-color="#ff00ff" />
      <stop offset="75%" stop-color="#00f7ff" />
      <stop offset="100%" stop-color="#0a0a2e" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="2" fill="url(#neon)" filter="url(#glow)" />
  <rect y="3" width="100%" height="1" fill="url(#neon)" opacity="0.3" />
</svg>